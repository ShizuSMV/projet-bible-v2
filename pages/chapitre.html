<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" href="../favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>La Parole de Dieu</title>

		<link rel="stylesheet" href="../css/index.css" />
		<link rel="stylesheet" href="../css/chapitre.css" />

		<!-- Google Fonts -->
		<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet" />

		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
		<script src="../js/supabase-client.js" defer></script>
		<script src="../js/chapitre.js" defer></script>
		<script src="../js/modale.js" defer></script>
		<script src="../js/contact.js" defer></script>
	</head>
	<body>
		<!-- VOILE DE CHARGEMENT -->
		<div id="voile" class="voile" aria-hidden="true"></div>

		<!-- HEADER -->
		<header class="header">
			<div id="top"></div>

			<a href="../index.html" class="header__logo">
				<div class="header__cross-bars" aria-hidden="true">
					<div class="header__cross-bar-1"></div>
					<div class="header__cross-bar-2"></div>
					<div class="header__cross-bar-3"></div>
					<div class="header__cross-bar-4"></div>
					<div class="header__cross-bar-5"></div>
					<div class="header__cross-bar-6"></div>
				</div>
				<h1 class="header__title header__title-top">
					<span class="header__title-la">La</span>
					<span class="header__title-parole">Parole</span>
				</h1>
				<h2 class="header__title header__title-bottom">
					<span class="header__title-de">De</span>
					<span class="header__title-dieu">Dieu</span>
				</h2>
			</a>

			<nav class="header__nav">
				<ul class="header__nav-list">
					<li class="header__list-container">
						<a class="header__list-link" href="../index.html">Accueil</a>
					</li>
					<li class="header__list-container">
						<a class="header__list-link" id="create-account-link" href="#">Créez un compte</a>
					</li>
				</ul>
			</nav>
		</header>

		<!-- Modale compte -->
		<section id="account-section" class="account-section">
			<button type="button" class="account-close" id="account-close-btn" aria-label="Fermer">✕</button>
			<form class="account-form"></form>
		</section>

		<!-- Modale contact -->
		<section id="contact-section" class="contact-section">
			<button type="button" class="account-close" id="contact-close-btn" aria-label="Fermer">✕</button>
			<div class="modale-welcome-icon" aria-hidden="true">
				<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
					<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
				</svg>
			</div>
			<div class="modale-header" style="text-align:center;align-items:center;">
				<p class="modale-eyebrow">Contact</p>
				<h2 class="modale-title">Nous écrire</h2>
				<p class="modale-subtitle">Une question ? Une suggestion ?</p>
			</div>
			<div class="modale-divider"></div>
			<a href="mailto:matteo.vandevraye@hotmail.fr" class="contact-section__email">matteo.vandevraye@hotmail.fr</a>
		</section>

		<!-- MAIN -->
		<main class="main chapitre">
			<a class="chapitre__back-btn" id="chapitre-back-btn" href="#">← Retour</a>

			<section class="chapitre__hero">
				<p class="chapitre__book-name" id="chapitre-book-name"></p>
				<h2 class="chapitre__title" id="chapitre-title"></h2>
			</section>

			<div class="chapitre__divider"></div>

			<section class="chapitre__content" id="chapitre-content">
				<p class="chapitre__loading">Chargement…</p>
			</section>

			<nav class="chapitre__nav">
				<a class="chapitre__nav-btn" id="chapitre-prev" href="#">← Précédent</a>
				<a class="chapitre__nav-btn" id="chapitre-next" href="#">Suivant →</a>
			</nav>
		</main>

		<!-- FOOTER -->
		<footer class="footer">
			<div class="footer__top">
				<div class="footer__brand">
					<span class="footer__brand-name">La Parole de Dieu</span>
					<span class="footer__brand-tagline">Explorez les Écritures saintes</span>
				</div>
				<nav class="footer__nav">
					<a href="#" class="footer__link" id="contact-link">Contact</a>
					<a href="#" class="footer__link">À propos</a>
				</nav>
			</div>
			<div class="footer__divider"></div>
			<div class="footer__bottom">
				<span class="footer__copy">© 2026 La Parole de Dieu</span>
			</div>
		</footer>

		<script>
			window.addEventListener('load', () => {
				setTimeout(() => {
					const voile = document.getElementById('voile');
					voile.classList.add('voile--hidden');
					voile.addEventListener('transitionend', () => voile.remove(), { once: true });
				}, 1200);
			});
		</script>
	</body>
</html>
