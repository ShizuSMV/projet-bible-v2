<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.8" result="blur1"/>
      <feGaussianBlur stdDeviation="3.5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond sombre -->
  <rect width="32" height="32" rx="5" fill="#111"/>

  <!-- Barre horizontale longue (traverse complète) -->
  <rect x="5" y="14.2" width="22" height="1.2" rx="0.6" fill="#e8d48a" filter="url(#glow)" opacity="0.9"/>

  <!-- Barre verticale longue (traverse complète) -->
  <rect x="14.8" y="3" width="1.2" height="26" rx="0.6" fill="#e8d48a" filter="url(#glow)" opacity="0.9"/>

  <!-- Centre lumineux -->
  <circle cx="15.4" cy="14.8" r="1.2" fill="#fff" filter="url(#glow)" opacity="0.85"/>
</svg>
